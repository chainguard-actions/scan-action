name: Test path scan
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create grype config file
        run: |
          cat > /tmp/grype-config.yaml << 'EOF'
          check-for-app-update: false
          EOF
      - id: action
        uses: .
        with:
          path: "."
          fail-build: "false"
          output-format: "table"
          severity-cutoff: "critical"
          only-fixed: "false"
          add-cpes-if-none: "false"
          by-cve: "false"
          config: "/tmp/grype-config.yaml"
      - name: Assert sarif output
        env:
          ACTUAL: ${{ steps.action.outputs.sarif }}
        run: |
          echo "actual sarif output: $ACTUAL"
          echo "PASS: path scan completed successfully"
