name: Test path scan
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          path: "."
          fail-build: "false"
          output-format: "table"
          severity-cutoff: "critical"
      - name: Assert action completed
        run: |
          echo "PASS: path scan completed without error"
