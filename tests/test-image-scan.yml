name: Test image scan
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          image: alpine:3.18
          grype-version: "v0.79.4"
          output-format: json
          output-file: /tmp/grype-results.json
          severity-cutoff: critical
          fail-build: "false"
          only-fixed: "false"
          add-cpes-if-none: "false"
          by-cve: "false"
          cache-db: "false"
      - name: Assert output file exists
        run: |
          echo "Checking output file /tmp/grype-results.json"
          if [ ! -f /tmp/grype-results.json ]; then
            echo "FAIL: output file not found"
            exit 1
          fi
          echo "PASS: output file exists"
      - name: Assert json output is set
        env:
          ACTUAL: ${{ steps.action.outputs.json }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected json output to be set"
            exit 1
          fi
          echo "PASS"
