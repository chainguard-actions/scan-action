name: Test SBOM scan with VEX
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Generate SBOM fixture
        run: |
          cat > /tmp/test-sbom.json << 'EOF'
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.4",
            "version": 1,
            "metadata": {
              "component": {
                "type": "container",
                "name": "test-image",
                "version": "latest"
              }
            },
            "components": []
          }
          EOF
      - name: Generate VEX fixture
        run: |
          cat > /tmp/test-vex.json << 'EOF'
          {
            "@context": "https://openvex.dev/ns/v0.2.0",
            "@id": "https://example.com/vex/1",
            "author": "Test Author",
            "timestamp": "2024-01-01T00:00:00Z",
            "version": 1,
            "statements": []
          }
          EOF
      - id: action
        uses: .
        with:
          sbom: /tmp/test-sbom.json
          vex: /tmp/test-vex.json
          output-format: sarif
          severity-cutoff: critical
          fail-build: "false"
          only-fixed: "false"
          add-cpes-if-none: "false"
          by-cve: "true"
      - name: Assert sarif output is set
        env:
          ACTUAL: ${{ steps.action.outputs.sarif }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected sarif output to be set"
            exit 1
          fi
          echo "PASS"
